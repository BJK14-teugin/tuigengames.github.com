<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퇴근 게임즈</title><style>
body{
background:#0d0d0f;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
width:100%;
max-width:500px;
text-align:center;
}

h1{
margin-bottom:30px;
font-size:40px;
}

.game{
background:#1a1a1e;
padding:20px;
margin:15px 0;
border-radius:15px;
cursor:pointer;
transition:0.2s;
border:1px solid #333;
}

.game:hover{
transform:scale(1.05);

}

.game h2{

}
</style></head><body><div class="container"><h1>🎮 퇴근 게임즈</h1><div class="game" onclick="openGame('snake.html')">
<h2>🐍 NEON SNAKE</h2>
</div><div class="game" onclick="openGame('gacha.html')">
<h2>🎰 가챠 유니버스</h2>
</div><div class="game" onclick="openGame('coin.html')">
<h2>📈 코인 게임</h2>
</div><div class="game" onclick="openGame('blacksmith.html')">
<h2>⚒️ 전설의 대장장이</h2>
</div></div><script>
function openGame(game){
window.location.href = game;
}
</script></body>
</html>
