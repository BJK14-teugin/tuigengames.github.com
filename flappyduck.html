<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:black;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

let duck = new Image();
duck.src = "file_00000000779c720785ff7e06d018aba2.png";

let bg = new Image();
bg.src = "file_0000000043007207958fd74e92447b9b.png";

let duckY = 200;
let velocity = 0;
let gravity = 0.5;

let pipes = [];
let score = 0;
let gameOver = false;

const ground = 550;

document.addEventListener("click", () => {

  if(gameOver){
    resetGame();
    return;
  }

  velocity = -8;
});

function spawnPipe(){

  let gap = 150;
  let topHeight = Math.random()*300+50;

  pipes.push({
    x:400,
    top:topHeight,
    bottom:topHeight+gap,
    passed:false
  });

}

setInterval(spawnPipe,2000);

function update(){

  ctx.drawImage(bg,0,0,canvas.width,canvas.height);

  if(!gameOver){
    velocity += gravity;
    duckY += velocity;
  }

  // 바닥 충돌
  if(duckY+60 >= ground){
    gameOver = true;
  }

  // 러버덕
  ctx.drawImage(duck,100,duckY,60,60);

  // 파이프
  ctx.fillStyle="green";

  pipes.forEach(pipe=>{

    pipe.x -= 2;

    // 위 파이프
    ctx.fillRect(pipe.x,0,60,pipe.top);

    // 아래 파이프
    ctx.fillRect(pipe.x,pipe.bottom,60,600);

    // 점수
    if(!pipe.passed && pipe.x<100){
      score++;
      pipe.passed=true;
    }

    // 충돌 판정
    if(
      100+60>pipe.x &&
      100<pipe.x+60 &&
      (duckY<pipe.top || duckY+60>pipe.bottom)
    ){
      gameOver=true;
    }

  });

  // 점수 표시
  ctx.fillStyle="white";
  ctx.font="40px Arial";
  ctx.fillText(score,180,60);

  // 바닥
  ctx.fillStyle="#654321";
  ctx.fillRect(0,ground,400,50);

  // 게임오버
  if(gameOver){
    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",90,300);

    ctx.font="20px Arial";
    ctx.fillText("클릭하면 다시 시작",120,340);
  }

  requestAnimationFrame(update);
}

function resetGame(){
  duckY=200;
  velocity=0;
  pipes=[];
  score=0;
  gameOver=false;
}

update();
</script>

</body>
</html>
